name: HTMLHelper
description: Monta blocos HTML fictícios para demos, previews de editor e placeholders de conteúdo.
works:
  - HTMLHelper começa com make() e encadeia métodos construtores como heading(), paragraphs(), listas, imagens e tabelas.
  - Chame generate() no fim da cadeia para retornar a string HTML final.
example:
  code: |
    echo HTMLHelper::make()
        ->heading(2)
        ->paragraphs(1)
        ->generate();
  output: |
    <h2>Título de Exemplo</h2><p>Parágrafo gerado...</p>
methods:
  make:
    description: Cria uma nova instância do construtor HTML e prepara o gerador de dados fictícios.
    example:
      code: |
        $html = HTMLHelper::make();
      output: |
        Instância de HTMLHelper pronta para encadear métodos.
  heading:
    description: Adiciona um heading com texto fictício ao HTML acumulado.
    parameters:
      level: Nível da tag heading, como 1, 2 ou 3.
    example:
      code: |
        HTMLHelper::make()->heading(2)->generate();
      output: |
        <h2>Título de Exemplo</h2>
  headingWithLink:
    description: Adiciona um heading com um link fictício dentro do texto.
    parameters:
      level: Nível da tag heading, como 1, 2 ou 3.
    example:
      code: |
        HTMLHelper::make()->headingWithLink(2)->generate();
      output: |
        <h2>Título <a href="#">Link de Exemplo</a> Gerado</h2>
  emptyParagraph:
    description: Adiciona um parágrafo vazio.
    example:
      code: |
        HTMLHelper::make()->emptyParagraph()->generate();
      output: |
        <p></p>
  paragraphs:
    description: Adiciona um ou mais parágrafos fictícios, com opção de inserir links aleatórios.
    parameters:
      count: Quantidade de parágrafos que serão gerados.
      withRandomLinks: Define se os parágrafos gerados terão links fictícios.
    example:
      code: |
        HTMLHelper::make()->paragraphs(1)->generate();
      output: |
        <p>Parágrafo fictício gerado para visualização.</p>
  unorderedList:
    description: Adiciona uma lista não ordenada com itens fictícios.
    parameters:
      count: Quantidade de itens que serão gerados.
    example:
      code: |
        HTMLHelper::make()->unorderedList(3)->generate();
      output: |
        <ul><li>primeiro</li><li>segundo</li><li>terceiro</li></ul>
  orderedList:
    description: Adiciona uma lista ordenada com itens fictícios.
    parameters:
      count: Quantidade de itens que serão gerados.
    example:
      code: |
        HTMLHelper::make()->orderedList(3)->generate();
      output: |
        <ol><li>primeiro</li><li>segundo</li><li>terceiro</li></ol>
  image:
    description: Adiciona uma imagem fictícia com largura, altura e texto alternativo.
    parameters:
      width: Largura usada no HTML gerado.
      height: Altura usada no HTML gerado.
    example:
      code: |
        HTMLHelper::make()->image(640, 480)->generate();
      output: |
        <img src="https://via.placeholder.com/640x480" alt="Imagem de exemplo" width="640" height="480">
  link:
    description: Adiciona um link fictício.
    example:
      code: |
        HTMLHelper::make()->link()->generate();
      output: |
        <a href="https://example.com">Link de exemplo</a>
  video:
    description: Adiciona um iframe de vídeo fictício para YouTube ou Vimeo.
    parameters:
      provider: Provedor usado no embed de vídeo.
      width: Largura usada no iframe.
      height: Altura usada no iframe.
    example:
      code: |
        HTMLHelper::make()->video('youtube', 640, 480)->generate();
      output: |
        <iframe width="640" height="480" src="https://www.youtube.com/embed/abc123def45" allowfullscreen></iframe>
  details:
    description: Adiciona um bloco details com summary e conteúdo fictício.
    example:
      code: |
        HTMLHelper::make()->details()->generate();
      output: |
        <details><summary>Pergunta de exemplo?</summary><div>Conteúdo detalhado gerado.</div></details>
  code:
    description: Adiciona um bloco pre/code com uma classe CSS opcional.
    parameters:
      className: Classe CSS aplicada ao bloco de código gerado.
    example:
      code: |
        HTMLHelper::make()->code('hljs')->generate();
      output: |
        <pre class="hljs"><code>export default function testComponent(...)</code></pre>
  blockquote:
    description: Adiciona uma citação fictícia.
    example:
      code: |
        HTMLHelper::make()->blockquote()->generate();
      output: |
        <blockquote>Citação de exemplo.</blockquote>
  hr:
    description: Adiciona uma linha horizontal.
    example:
      code: |
        HTMLHelper::make()->hr()->generate();
      output: |
        <hr>
  br:
    description: Adiciona uma quebra de linha.
    example:
      code: |
        HTMLHelper::make()->br()->generate();
      output: |
        <br>
  table:
    description: Adiciona uma tabela fictícia com cabeçalho e duas linhas de conteúdo.
    example:
      code: |
        HTMLHelper::make()->table()->generate();
      output: |
        <table><thead><tr><th>Nome</th><th>Status</th></tr></thead><tbody><tr><td>Demo</td><td>Ativo</td></tr></tbody></table>
  grid:
    description: Adiciona um grid responsivo com colunas fictícias.
    parameters:
      cols: Distribuição das colunas no grid gerado.
    example:
      code: |
        HTMLHelper::make()->grid([1, 1, 1])->generate();
      output: |
        <div class="grid" data-type="responsive" data-cols="3">...</div>
  generate:
    description: Retorna todo o HTML acumulado na cadeia de métodos.
    example:
      code: |
        HTMLHelper::make()->heading(2)->generate();
      output: |
        <h2>Título de Exemplo</h2>
